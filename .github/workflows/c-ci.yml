name: C CI

on: [push, pull_request]

jobs:
  build_x86:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: configure
      run: ./configure
    - name: make
      run: make
    - name: make check
      run: make check

  build_arm64:
    runs-on: ubuntu-24.04-arm
    steps:
    - uses: actions/checkout@v5
    - name: configure
      run: ./configure
    - name: make
      run: make
    - name: make check
      run: make check

  build_s390x:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v5
    - uses: uraimo/run-on-arch-action@v3
    - with:
      arch: s390x
      distro: ubuntu24.04
    - name: configure
      run: ./configure
    - name: make
      run: make
    - name: make check
      run: make check
