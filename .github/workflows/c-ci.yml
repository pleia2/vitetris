name: C CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: [ubuntu-latest, ubuntu-24.04-arm]

    steps:
    - uses: actions/checkout@v5
    - name: configure
      run: ./configure
    - name: make
      run: make
    - name: make check
      run: make check
