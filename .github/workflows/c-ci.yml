name: C CI

on: [push, pull_request]

jobs:
  build_x86:
    runs-on: ubuntu-latest
    name: Build on ubuntu-24.04 for x86_64
    steps:
    - uses: actions/checkout@v5
    - name: configure
      run: ./configure
    - name: make
      run: make
    - name: make check
      run: make check

  build_arm64:
    runs-on: ubuntu-24.04-arm
    name: Build on ubuntu-24.04 for ARM64
    steps:
    - uses: actions/checkout@v5
    - name: configure
      run: ./configure
    - name: make
      run: make
    - name: make check
      run: make check

  build_s390x:
    runs-on: ubuntu-24.04
    name: Build on ubuntu-24.04 s390x (emulated)
    steps:
      - uses: actions/checkout@v5
      - uses: uraimo/run-on-arch-action@v3
        name: Run Makefile commands
        id: runcmd
        with:
          arch: s390x
          distro: ubuntu24.04
          run: |
            ./configure
            make
            make check
      - name: Get the output
          run: |
            echo "The configure, make, make check output was: ${{ steps.runcmd.outputs.uname }}"
